<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reservar turno - SalonMind</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabaseClient.js"></script>
</head>
<body>

<div class="main">

<h1 id="nombreLocal">📅 Reservar turno</h1>

<div id="mensajeError" class="card" style="display:none;">

<p id="textoError" style="color:#EF4444;"></p>

</div>

<div id="formularioReserva" class="card">

<p><strong>Tu nombre</strong></p>
<input id="nombreCliente" placeholder="Nombre completo">

<p><strong>Tu teléfono (con código de país)</strong></p>
<input id="telefonoCliente" placeholder="Ej: 5491122334455">

<p><strong>Servicio</strong></p>
<select id="servicio">
<option>Seleccionar servicio</option>
</select>

<p><strong>Profesional</strong></p>
<select id="profesional">
<option>Seleccionar profesional</option>
</select>

<div id="perfilProfesional"></div>

<p><strong>Fecha</strong></p>
<input type="date" id="fecha">

<p><strong>Horario</strong></p>
<select id="hora">
<option>Elegí profesional y fecha primero</option>
</select>

<button class="btn" onclick="reservarTurno()">📅 Reservar turno</button>

</div>

</div>

<script src="js/reservar.js"></script>

</body>
</html>
