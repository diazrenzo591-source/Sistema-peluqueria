<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SalonMind - Caja</title>

<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">
<script src="js/sesion.js"></script>
</head>


<body>


<div class="topbar">

<h2>SalonMind</h2>

<nav>
<a href="dashboard.html" title="Dashboard">📊</a>
<a href="clientes.html" title="Clientes">👥</a>
<a href="turnos.html" title="Turnos">📅</a>
<a href="agenda.html" title="Agenda">🗓️</a>
<a href="servicios.html" title="Servicios">✂️</a>
<a href="empleados.html" title="Empleados">👨‍💼</a>
<a href="caja.html" title="Caja">💰</a>
<a href="#" title="Cerrar sesión" onclick="logout()">🚪</a>
</nav>

</div>



<div class="main">


<h1>💰 Caja</h1>


<div class="cards">

<div class="card">
<h2 id="hoy">$0</h2>
<p>Hoy</p>
</div>


<div class="card">
<h2 id="semana">$0</h2>
<p>Semana</p>
</div>


<div class="card">
<h2 id="mes">$0</h2>
<p>Mes</p>
</div>

</div>


<div class="table-container">

<div class="filtros">

<select id="filtroCaja" onchange="cambiarFiltro()">
<option value="todo">Todo el historial</option>
<option value="hoy">Hoy</option>
<option value="semana">Esta semana</option>
<option value="mes">Este mes</option>
<option value="rango">Rango de fechas</option>
</select>

<input type="date" id="fechaDesde" style="display:none;">
<input type="date" id="fechaHasta" style="display:none;">

<button class="btn" id="btnFiltrarRango" onclick="mostrarCaja()" style="display:none;">
Filtrar
</button>

</div>

<p id="totalFiltrado"></p>

<table>

<thead>
<tr>
<th>Cliente</th>
<th>Servicio</th>
<th>Monto</th>
<th>Pago</th>
<th>Fecha</th>
</tr>
</thead>

<tbody id="tablaCaja"></tbody>

</table>

</div>


<div class="table-container" style="margin-top:20px;">

<h2 style="color:white;margin-bottom:15px;">👨‍💼 Facturación por profesional</h2>

<table>

<thead>
<tr>
<th>Profesional</th>
<th>Servicios</th>
<th>Total facturado</th>
</tr>
</thead>

<tbody id="tablaProfesionales"></tbody>

</table>

</div>


</div>


<script src="js/caja.js"></script>


</body>

</html>
