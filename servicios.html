<h1>✂️ Servicios</h1>


<button class="btn" onclick="mostrarServicio()">

➕ Nuevo Servicio

</button>



<div id="formServicio" class="formulario">


<h2>Nuevo Servicio</h2>


<input id="nombreServicio" placeholder="Nombre del servicio">


<input id="precioServicio" type="number" placeholder="Precio">


<input id="duracionServicio" placeholder="Duración (minutos)">



<button class="btn" onclick="guardarServicio()">

Guardar

</button>


</div>


<div id="formEditarServicio" class="formulario">

<h2>Editar Servicio</h2>

<input id="editarNombreServicio" placeholder="Nombre del servicio">

<input id="editarPrecioServicio" type="number" placeholder="Precio">

<input id="editarDuracionServicio" placeholder="Duración (minutos)">

<button class="btn" onclick="guardarEdicionServicio()">
💾 Guardar cambios
</button>

</div>




<div class="table-container">


<table>


<thead>

<tr>

<th>Servicio</th>
<th>Precio</th>
<th>Duración</th>
<th>Acciones</th>

</tr>

</thead>

</tbody>
