<div class="main">


<h1>👨‍💼 Empleados</h1>


<button class="btn" onclick="mostrarEmpleado()">

➕ Nuevo Empleado

</button>



<div id="formEmpleado" class="formulario">


<h2>Nuevo Empleado</h2>


<input id="nombreEmpleado" placeholder="Nombre">


<input id="comisionEmpleado" placeholder="Comisión %">


<input id="usuarioEmpleado" placeholder="Usuario (para que el empleado ingrese)">


<input id="claveEmpleado" type="password" placeholder="Contraseña">


<button class="btn" onclick="guardarEmpleado()">

Guardar

</button>


</div>


<div id="formEditarEmpleado" class="formulario">

<h2>Editar Empleado</h2>

<input id="editarNombreEmpleado" placeholder="Nombre">

<input id="editarComisionEmpleado" placeholder="Comisión %">

<button class="btn" onclick="guardarEdicionEmpleado()">
💾 Guardar cambios
</button>

</div>



<div class="table-container">


<table>

<thead>

<tr>

<th>Nombre</th>
<th>Comisión</th>
<th>Ganancias</th>
<th>Perfil</th>
<th>Acciones</th>

</tr>

</thead>


<tbody id="tablaEmpleados">


</tbody>


</table>


</div>

</div>
