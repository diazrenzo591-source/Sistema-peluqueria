<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SalonMind - Turnos</title>

<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">
</head>


<body>


<div class="topbar">

<h2>SalonMind</h2>

<nav>

<a href="dashboard.html">📊</a>
<a href="clientes.html">👥</a>
<a href="turnos.html">📅</a>
<a href="servicios.html">✂️</a>
<a href="empleados.html">👨‍💼</a>
<a href="caja.html">💰</a>

</nav>

</div>



<div class="main">


<h1>📅 Gestión de Turnos</h1>


<button class="btn" onclick="mostrarTurno()">
➕ Nuevo Turno
</button>



<div id="formTurno" class="formulario">


<h2>Nuevo Turno</h2>


<select id="cliente">

<option>Seleccionar cliente</option>

</select>


<input type="date" id="fecha">


<input type="time" id="hora">


<select id="servicio">

<option>Seleccionar servicio</option>

</select>

<input 
id="precioTurno"
type="number"
placeholder="Precio del servicio">

<select id="profesional">

<option>Seleccionar profesional</option>
<option>Lucas</option>
<option>Ana</option>

</select>


<select id="estado">

<option>Pendiente</option>
<option>Confirmado</option>
<option>Finalizado</option>
<option>Cancelado</option>

</select>
<button class="btn" onclick="guardarTurno()">
Guardar Turno
</button>

<select id="formaPago">

<option>Efectivo</option>
<option>Transferencia</option>
<option>Tarjeta</option>

</select>

</div>




<div class="table-container">

<table>

<thead>

<tr>
<th>Hora</th>
<th>Cliente</th>
<th>Servicio</th>
<th>Profesional</th>
<th>Estado</th>
<th>Acción</th>
</tr>

</thead>


<tbody id="tablaTurnos">


</tbody>


</table>

</div>


</div>



<script src="js/turnos.js"></script>

</body>

</html>
